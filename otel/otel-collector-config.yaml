receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318
        cors:                          # ← added: allows browser to POST metrics
          allowed_origins:
            - "http://localhost:4200"  # Angular dev server
            - "http://localhost:80"    # Angular in Docker
          allowed_headers:
            - "*"

processors:
  batch:
    timeout: 10s

exporters:
  # Export to Prometheus
  prometheus:
    endpoint: "0.0.0.0:8889"
    namespace: "microservices"
  
  # Export traces to console for debugging
  debug:
    verbosity: detailed
    sampling_initial: 5
    sampling_thereafter: 200
  
service:
  pipelines:
    # Metrics pipeline
    metrics:
      receivers: [otlp]
      processors: [batch]
      exporters: [prometheus, debug]
    
    # Traces pipeline
    traces:
      receivers: [otlp]
      processors: [batch]
      exporters: [debug]