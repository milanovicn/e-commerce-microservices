<!-- Login/Register View (shown when NOT logged in) -->
<div *ngIf="!authService.isLoggedIn()">
  <router-outlet></router-outlet>
</div>

<!-- Main App (shown when logged in) -->
<div *ngIf="authService.isLoggedIn()">
  <!-- Navigation Bar -->
  <nav class="navbar">
    <div class="nav-brand">
      <h1>🛒 E-Commerce</h1>
    </div>
    
    <div class="nav-menu">
      <button routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-btn">
        Products
      </button>
      <button *ngIf="isAdmin" routerLink="/admin" routerLinkActive="active" class="nav-btn admin-btn">
        🔧 Admin Panel
      </button>
    </div>
    
    <div class="nav-user">
      <span class="username">
        {{ (currentUser$ | async)?.username }}
        <span class="role-badge" *ngIf="isAdmin">ADMIN</span>
      </span>
      <button (click)="logout()" class="logout-btn">Logout</button>
    </div>
  </nav>

  <!-- Router Outlet for Main/Admin components -->
  <router-outlet></router-outlet>
</div>
