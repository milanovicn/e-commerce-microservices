server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    # Serve Angular app
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy ALL /api/products requests (with or without trailing slash)
    location ~ ^/api/products {
        rewrite ^/api/products(.*)$ /api/products$1 break;
        proxy_pass http://product-service:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy ALL /api/orders requests
    location ~ ^/api/orders {
        rewrite ^/api/orders(.*)$ /api/orders$1 break;
        proxy_pass http://order-service:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Proxy ALL /api/notifications requests
    location ~ ^/api/notifications {
        rewrite ^/api/notifications(.*)$ /api/notifications$1 break;
        proxy_pass http://notification-service:8083;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}